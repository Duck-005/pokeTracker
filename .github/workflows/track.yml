name: Pokémon Progress Tracker Pipeline

on:
  # Run every hour at minute 17
  schedule:
    - cron: '17 * * * *'

  # Manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  track-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Create Cache and Output Directories
        run: |
          mkdir -p cache
          mkdir -p dashboard

      - name: Run Savefile Tracker Orchestrator
        run: |
          python scripts/update.py

      - name: Commit Updated Data
        id: commit_data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dashboard/data.json cache/hashes.json

          if git diff --cached --quiet; then
            echo "No savefile changes detected."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: auto-update Pokémon progress data"
            git push origin main
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup GitHub Pages
        if: steps.commit_data.outputs.changed == 'true'
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        if: steps.commit_data.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dashboard'

      - name: Deploy to GitHub Pages
        if: steps.commit_data.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
